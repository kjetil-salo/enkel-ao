<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Enkel-AO karusell 1</title>
  <desc id="desc">Facebook-reklame med fokus pa lokalitet, GPS og feriebruk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d34"/>
      <stop offset="55%" stop-color="#153e75"/>
      <stop offset="100%" stop-color="#0c6b64"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eaf4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#04111f" flood-opacity="0.26"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#081727" flood-opacity="0.16"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="618" y="164" width="362" height="784" rx="34" ry="34"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="118" cy="176" r="132" fill="#7dd3fc" opacity="0.12"/>
  <circle cx="960" cy="180" r="156" fill="#fde68a" opacity="0.14"/>
  <circle cx="930" cy="1188" r="220" fill="#86efac" opacity="0.12"/>

  <rect x="76" y="74" width="248" height="56" rx="24" ry="24" fill="#ecfeff" opacity="0.96"/>
  <text x="200" y="110" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" fill="#11314d">Sommerutgave</text>

  <text x="76" y="224" font-family="Helvetica, Arial, sans-serif" font-size="68" font-weight="800" fill="#f8fbff">
    <tspan x="76" dy="0">Kjenner fuglen.</tspan>
    <tspan x="76" dy="78">Ikke stedsnavnet.</tspan>
  </text>

  <text x="78" y="406" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#dcedff">
    <tspan x="78" dy="0">Pa ferie er det ofte lokaliteten</tspan>
    <tspan x="78" dy="38">som er vanskeligst.</tspan>
    <tspan x="78" dy="38">Enkel-AO bruker GPS til a finne</tspan>
    <tspan x="78" dy="38">aktuelle steder der du star.</tspan>
  </text>

  <g filter="url(#softShadow)">
    <rect x="76" y="610" width="456" height="140" rx="30" ry="30" fill="url(#panel)"/>
    <circle cx="124" cy="680" r="28" fill="#2563eb"/>
    <text x="124" y="689" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">1</text>
    <text x="168" y="667" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f2640">Trykk oppdater lokasjon</text>
    <text x="168" y="705" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#4b647d">GPS gir aktuelle AO-lokaliteter rundt deg.</text>

    <rect x="76" y="780" width="456" height="140" rx="30" ry="30" fill="url(#panel)"/>
    <circle cx="124" cy="850" r="28" fill="#0f766e"/>
    <text x="124" y="859" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">2</text>
    <text x="168" y="837" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f2640">Velg fra liste eller kart</text>
    <text x="168" y="875" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#4b647d">Slipp a gjette nar du er et nytt sted.</text>

    <rect x="76" y="950" width="456" height="140" rx="30" ry="30" fill="url(#panel)"/>
    <circle cx="124" cy="1020" r="28" fill="#ca8a04"/>
    <text x="124" y="1029" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">3</text>
    <text x="168" y="1007" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f2640">Registrer med riktig sted</text>
    <text x="168" y="1045" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#4b647d">Bygget for enklere vei inn i Artsobservasjoner.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="588" y="108" width="422" height="892" rx="54" ry="54" fill="#10253d" stroke="#5ba7ff" stroke-width="4"/>
    <rect x="726" y="130" width="146" height="18" rx="9" ry="9" fill="#dbeafe"/>
    <rect x="618" y="164" width="362" height="784" rx="34" ry="34" fill="#f8fbff"/>
    <g clip-path="url(#screenClip)">
      <rect x="618" y="164" width="362" height="92" fill="#0f172a"/>
      <text x="650" y="218" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">Enkel-AO</text>
      <rect x="828" y="196" width="96" height="34" rx="17" ry="17" fill="#2563eb"/>
      <text x="876" y="218" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Felt</text>

      <text x="646" y="292" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">LOKASJON</text>
      <circle cx="650" cy="324" r="6" fill="#22c55e"/>
      <text x="666" y="330" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#0f172a">Posisjon oppdatert</text>

      <rect x="646" y="352" width="162" height="46" rx="14" ry="14" fill="#dbeafe" stroke="#93c5fd"/>
      <text x="727" y="381" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Oppdater lokasjon</text>

      <rect x="820" y="352" width="64" height="46" rx="14" ry="14" fill="#ecfeff" stroke="#99f6e4"/>
      <text x="852" y="381" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#0f766e">m</text>

      <rect x="896" y="352" width="52" height="46" rx="14" ry="14" fill="#dbeafe" stroke="#93c5fd"/>
      <text x="922" y="382" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#1d4ed8">+</text>

      <text x="646" y="440" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">STEDSNAVN</text>
      <rect x="646" y="454" width="304" height="54" rx="16" ry="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="668" y="488" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0f172a">Korshavn, Farsund</text>

      <text x="646" y="546" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">FORSLAG FRA AO</text>
      <rect x="646" y="564" width="304" height="78" rx="22" ry="22" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="670" y="600" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Korshavnodden</text>
      <text x="670" y="628" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#475569">220 m unna</text>

      <rect x="646" y="658" width="304" height="78" rx="22" ry="22" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="670" y="694" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Lille Presteskjaer</text>
      <text x="670" y="722" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#475569">410 m unna</text>

      <rect x="646" y="752" width="304" height="78" rx="22" ry="22" fill="#ecfeff" stroke="#99f6e4"/>
      <text x="670" y="788" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Vis i kart</text>
      <text x="670" y="816" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#475569">Se alle lokaliteter rundt deg</text>
    </g>
    <rect x="734" y="966" width="130" height="14" rx="7" ry="7" fill="#dbeafe" opacity="0.55"/>
  </g>

  <rect x="76" y="1198" width="928" height="94" rx="32" ry="32" fill="#facc15"/>
  <text x="540" y="1258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="39" font-weight="800" fill="#0f2640">GPS inn. Riktig lokalitet ut.</text>
</svg>
