<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Enkel-AO karusell 3</title>
  <desc id="desc">Facebook-reklame som viser feltmodus og etterregistrering i Enkel-AO.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#08101e" flood-opacity="0.24"/>
    </filter>
    <filter id="softShadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#08101e" flood-opacity="0.16"/>
    </filter>
    <clipPath id="screenClip3a">
      <rect x="574" y="214" width="186" height="620" rx="28" ry="28"/>
    </clipPath>
    <clipPath id="screenClip3b">
      <rect x="780" y="214" width="186" height="620" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg3)"/>
  <circle cx="132" cy="182" r="132" fill="#c4b5fd" opacity="0.14"/>
  <circle cx="930" cy="1158" r="208" fill="#99f6e4" opacity="0.10"/>
  <circle cx="962" cy="148" r="146" fill="#fde68a" opacity="0.14"/>

  <rect x="76" y="74" width="270" height="56" rx="24" ry="24" fill="#eef2ff" opacity="0.95"/>
  <text x="211" y="110" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2552">Samme app, to flyter</text>

  <text x="76" y="224" font-family="Helvetica, Arial, sans-serif" font-size="66" font-weight="800" fill="#f8fbff">
    <tspan x="76" dy="0">Felt ute.</tspan>
    <tspan x="76" dy="76">Etterregistrering hjemme.</tspan>
  </text>

  <text x="78" y="392" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#e1e8ff">
    <tspan x="78" dy="0">Nar du star ute, skal det ga fort.</tspan>
    <tspan x="78" dy="38">Nar du registrerer senere, trenger du</tspan>
    <tspan x="78" dy="38">dato, klokkeslett og stedsnavn.</tspan>
  </text>

  <g filter="url(#softShadow3)">
    <rect x="76" y="592" width="430" height="142" rx="30" ry="30" fill="url(#card3)"/>
    <text x="112" y="646" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="800" fill="#172554">Feltmodus</text>
    <text x="112" y="688" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#4b5d76">GPS, lokaliteter og rask registrering der du er.</text>

    <rect x="76" y="766" width="430" height="142" rx="30" ry="30" fill="url(#card3)"/>
    <text x="112" y="820" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="800" fill="#172554">Etterregistrering</text>
    <text x="112" y="862" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#4b5d76">Sett dato, tid og sted selv med kjent AO-flyt.</text>

    <rect x="76" y="940" width="430" height="164" rx="30" ry="30" fill="url(#card3)"/>
    <text x="112" y="994" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="800" fill="#172554">Valgfritt AO-brukeroppsett</text>
    <text x="112" y="1036" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#4b5d76">
      <tspan x="112" dy="0">Kjor helt lokalt i nettleseren, eller</tspan>
      <tspan x="112" dy="30">legg inn AO-bruker for smidigere eksport.</tspan>
    </text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="554" y="164" width="432" height="724" rx="48" ry="48" fill="#0f172a" stroke="#bfdbfe" stroke-width="4"/>
    <rect x="574" y="214" width="186" height="620" rx="28" ry="28" fill="#f8fbff"/>
    <rect x="780" y="214" width="186" height="620" rx="28" ry="28" fill="#f8fbff"/>

    <g clip-path="url(#screenClip3a)">
      <rect x="574" y="214" width="186" height="68" fill="#0f172a"/>
      <text x="594" y="255" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#ffffff">Felt</text>
      <rect x="666" y="233" width="72" height="30" rx="15" ry="15" fill="#2563eb"/>

      <circle cx="594" cy="316" r="5" fill="#22c55e"/>
      <text x="608" y="322" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">Posisjon oppdatert</text>
      <rect x="592" y="344" width="148" height="40" rx="12" ry="12" fill="#dbeafe"/>
      <text x="666" y="369" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Oppdater lokasjon</text>

      <text x="592" y="420" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#475569">STED</text>
      <rect x="592" y="430" width="150" height="42" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="604" y="456" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">Korshavn</text>

      <text x="592" y="504" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#475569">ART</text>
      <rect x="592" y="514" width="150" height="42" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="604" y="540" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#64748b">Svarthvit...</text>

      <rect x="592" y="578" width="72" height="40" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="628" y="603" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">1</text>
      <rect x="674" y="578" width="68" height="40" rx="12" ry="12" fill="#ecfeff" stroke="#99f6e4"/>
      <text x="708" y="603" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f766e">OK</text>

      <rect x="592" y="644" width="150" height="44" rx="14" ry="14" fill="#22c55e"/>
      <text x="667" y="672" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Registrer</text>
    </g>

    <g clip-path="url(#screenClip3b)">
      <rect x="780" y="214" width="186" height="68" fill="#0f172a"/>
      <text x="798" y="255" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Etterregistrering</text>

      <text x="798" y="320" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#475569">DATO</text>
      <rect x="798" y="330" width="150" height="42" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="810" y="356" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">2026-07-03</text>

      <text x="798" y="404" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#475569">TID</text>
      <rect x="798" y="414" width="72" height="42" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="834" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">08:20</text>
      <rect x="876" y="414" width="72" height="42" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="912" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">09:10</text>

      <text x="798" y="488" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#475569">STED</text>
      <rect x="798" y="498" width="150" height="42" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="810" y="524" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0f172a">Lista fyr</text>

      <rect x="798" y="566" width="150" height="64" rx="16" ry="16" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="812" y="598" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Listaodden</text>
      <text x="812" y="620" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#64748b">autocomplete fra AO</text>

      <rect x="798" y="654" width="150" height="44" rx="14" ry="14" fill="#2563eb"/>
      <text x="873" y="682" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Klar for eksport</text>
    </g>
  </g>

  <rect x="76" y="1198" width="928" height="94" rx="32" ry="32" fill="#e0e7ff"/>
  <text x="540" y="1258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#1e3a8a">Bruk den ute. Eller nar du kommer hjem.</text>
</svg>
