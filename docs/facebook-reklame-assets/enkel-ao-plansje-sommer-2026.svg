<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Facebook-plansje for Enkel-AO</title>
  <desc id="desc">Sommerplansje for Enkel-AO med ekte GPS-skjerm, lokalitetsliste, kart, artsøk med autocomplete og valgfri AO-innlogging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1b38"/>
      <stop offset="55%" stop-color="#15336b"/>
      <stop offset="100%" stop-color="#0c5a58"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#050c18" flood-opacity="0.24"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#091120" flood-opacity="0.16"/>
    </filter>
    <clipPath id="mainScreen">
      <rect x="692" y="154" width="292" height="674" rx="28" ry="28"/>
    </clipPath>
    <clipPath id="thumb1Screen">
      <rect x="79" y="947" width="112" height="236" rx="20" ry="20"/>
    </clipPath>
    <clipPath id="thumb2Screen">
      <rect x="325" y="947" width="112" height="236" rx="20" ry="20"/>
    </clipPath>
    <clipPath id="thumb3Screen">
      <rect x="571" y="947" width="112" height="236" rx="20" ry="20"/>
    </clipPath>
    <clipPath id="thumb4Screen">
      <rect x="817" y="947" width="112" height="236" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="110" cy="170" r="138" fill="#7dd3fc" opacity="0.12"/>
  <circle cx="952" cy="164" r="148" fill="#fde68a" opacity="0.12"/>
  <circle cx="930" cy="1180" r="210" fill="#86efac" opacity="0.10"/>

  <rect x="74" y="54" width="250" height="56" rx="24" ry="24" fill="#ecfeff" opacity="0.96"/>
  <text x="199" y="91" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="#12314d">ENKEL-AO</text>

  <text x="76" y="198" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fbff">
    <tspan x="76" dy="0">Enklere vei inn i</tspan>
    <tspan x="76" dy="68">Artsobservasjoner</tspan>
  </text>

  <text x="78" y="344" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#dce8ff">
    <tspan x="78" dy="0">Enkel-AO erstatter ikke AO.</tspan>
    <tspan x="78" dy="40">Det er bare et enklere lag oppå, laget</tspan>
    <tspan x="78" dy="40">for rask registrering og riktig lokalitet.</tspan>
  </text>

  <g filter="url(#softShadow)">
    <rect x="76" y="462" width="476" height="126" rx="30" ry="30" fill="url(#card)"/>
    <text x="112" y="504" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#122844">GPS finner lokalitetene rundt deg</text>
    <text x="112" y="540" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#52657a">
      <tspan x="112" dy="0">Nyttig når du er på ferie</tspan>
      <tspan x="112" dy="26">og ikke kan stedsnavnene.</tspan>
    </text>

    <rect x="76" y="600" width="476" height="126" rx="30" ry="30" fill="url(#card)"/>
    <text x="112" y="642" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#122844">Liste eller kart gir rask oversikt</text>
    <text x="112" y="678" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#52657a">
      <tspan x="112" dy="0">Velg riktig sted uten å famle</tspan>
      <tspan x="112" dy="26">deg fram i AO.</tspan>
    </text>

    <rect x="76" y="738" width="476" height="152" rx="30" ry="30" fill="url(#card)"/>
    <text x="112" y="780" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#122844">Innlogging er valgfri</text>
    <text x="112" y="816" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#52657a">
      <tspan x="112" dy="0">Bruk appen fint uten innlogging.</tspan>
      <tspan x="112" dy="22">Vil du eksportere enklest mulig til AO,</tspan>
      <tspan x="112" dy="22">kan du velge innlogging.</tspan>
      <tspan x="112" dy="22">Brukernavn og passord lagres ikke på serveren.</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="692" y="154" width="292" height="674" rx="28" ry="28" fill="#ffffff" stroke="#6ea8ff" stroke-width="4"/>
    <image href="/Users/kjetil/git/enkel-ao/docs/facebook-reklame-assets/screens/enkel-ao-screen-gps-mobile.png" x="692" y="154" width="292" height="674" preserveAspectRatio="xMidYMin slice" clip-path="url(#mainScreen)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="79" y="947" width="112" height="236" rx="20" ry="20" fill="#ffffff" stroke="#8be0c8" stroke-width="3"/>
    <image href="/Users/kjetil/git/enkel-ao/docs/facebook-reklame-assets/screens/enkel-ao-screen-gps-mobile.png" x="79" y="947" width="112" height="236" preserveAspectRatio="xMidYMin slice" clip-path="url(#thumb1Screen)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="325" y="947" width="112" height="236" rx="20" ry="20" fill="#ffffff" stroke="#8be0c8" stroke-width="3"/>
    <image href="/Users/kjetil/git/enkel-ao/docs/facebook-reklame-assets/screens/enkel-ao-screen-map-mobile.png" x="325" y="947" width="112" height="236" preserveAspectRatio="xMidYMin slice" clip-path="url(#thumb2Screen)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="571" y="947" width="112" height="236" rx="20" ry="20" fill="#ffffff" stroke="#8be0c8" stroke-width="3"/>
    <image href="/Users/kjetil/git/enkel-ao/docs/facebook-reklame-assets/screens/enkel-ao-screen-art-autocomplete-mobile.png" x="571" y="947" width="112" height="236" preserveAspectRatio="xMidYMin slice" clip-path="url(#thumb3Screen)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="817" y="947" width="112" height="236" rx="20" ry="20" fill="#ffffff" stroke="#8be0c8" stroke-width="3"/>
    <image href="/Users/kjetil/git/enkel-ao/docs/facebook-reklame-assets/screens/enkel-ao-screen-settings-ao.png" x="817" y="947" width="112" height="236" preserveAspectRatio="xMidYMin slice" clip-path="url(#thumb4Screen)"/>
  </g>

  <rect x="74" y="1230" width="934" height="88" rx="32" ry="32" fill="#facc15"/>
  <text x="541" y="1285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="#102743">AO i bunnen. Enkel-AO på toppen.</text>
</svg>
