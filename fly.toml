# fly.toml app configuration file generated for enkel-ao on 2026-01-09T17:44:31+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'enkel-ao'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.http_checks]]
    interval = 10000
    timeout = 2000
    method = "get"
    path = "/health"
    protocol = "http"
    tls_skip_verify = true

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
