      function isPrivateSite(site) {
        if (!site || typeof site !== 'object') return false;
        const raw = site.raw && typeof site.raw === 'object' ? site.raw : site;
        if (!raw || typeof raw !== 'object') return false;

        // Bruk isPrivate-flagget fra AO. Kun eksplisitt true / "true" er privat.
        if (Object.prototype.hasOwnProperty.call(raw, 'isPrivate')) {
          const v = raw.isPrivate;
          if (v === true || v === 'true') return true;
          if (v === false || v === 'false') return false;
        }
        if (Object.prototype.hasOwnProperty.call(raw, 'IsPrivate')) {
          const v = raw.IsPrivate;
          if (v === true || v === 'true') return true;
          if (v === false || v === 'false') return false;
        }

        return false;
      }

      function getSiteLabel(site) {
        if (!site || typeof site !== 'object') return '';
        // Bruk konsekvent "name" fra AO som lokalitetsnavn
        if (typeof site.name === 'string' && site.name.trim()) {
          return site.name.trim();
        }
        const raw = site.raw && typeof site.raw === 'object' ? site.raw : site;
        if (raw && typeof raw.name === 'string' && raw.name.trim()) {
          return raw.name.trim();
        }
        return '';
      }

      function flashButton(button, successLabel) {

      // Haversine distance in meters
      function haversine(lat1, lon1, lat2, lon2) {
        function toRad(x) { return x * Math.PI / 180; }
        const R = 6371000;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
      }

      function setAoSiteSuggestions(sites) {
          console.log('currentPosition:', currentPosition);
        currentAoSites = Array.isArray(sites) ? sites : [];
        const dropdown = document.getElementById('ao-sites-dropdown');
        if (!dropdown) return;
        dropdown.innerHTML = '';
        dropdown.style.display = 'block';
        aoSitesEl.style.display = 'none';

        if (!currentAoSites.length) {
          dropdown.style.display = 'none';
          aoSitesEl.innerHTML = 'Ingen lokasjoner fra Artsobservasjoner i nærheten.';
          aoSitesEl.style.display = 'block';
          return;
        }

        // Sorter: superlokasjon > offentlig > privat, deretter på avstand
        const userLat = currentPosition && typeof currentPosition.lat === 'number' ? currentPosition.lat : null;
        const userLon = currentPosition && typeof currentPosition.lon === 'number' ? currentPosition.lon : null;
        if (userLat == null || userLon == null) {
          aoSitesEl.innerHTML = 'Kan ikke vise avstand til lokasjoner fordi posisjonen til enheten ikke er tilgjengelig. Godta posisjonsdeling i nettleseren.';
          aoSitesEl.style.display = 'block';
        }
        const withDist = currentAoSites.map(site => {
          let dist = null;
          const lat = parseFloat(site.lat);
          const lon = parseFloat(site.lon);
          if (userLat != null && userLon != null && !isNaN(lat) && !isNaN(lon)) {
            dist = haversine(userLat, userLon, lat, lon);
          }
          return { ...site, _distance: dist };
        });
        withDist.sort((a, b) => {
          // Superlokasjon først
          if ((a.isSuper ? 1 : 0) !== (b.isSuper ? 1 : 0)) return (b.isSuper ? 1 : 0) - (a.isSuper ? 1 : 0);
          // Offentlig før privat
          if (isPrivateSite(a) !== isPrivateSite(b)) return isPrivateSite(a) - isPrivateSite(b);
          // Nærmest først
          if (a._distance != null && b._distance != null) return a._distance - b._distance;
          return 0;
        });

        // Maks 20 elementer
        const visibleSites = withDist.filter(s => s && typeof s.name === 'string' && s.name.trim()).slice(0, 20);
        console.log('AO visibleSites:', visibleSites);
        if (!visibleSites.length) {
          dropdown.style.display = 'none';
          aoSitesEl.innerHTML = 'Ingen lokasjoner fra Artsobservasjoner i nærheten.';
          aoSitesEl.style.display = 'block';
          return;

        // Legg til en tom "Velg lokasjon"-rad

        emptyDiv.textContent = 'Velg lokasjon...';
        emptyDiv.style.color = 'var(--muted)';
        emptyDiv.style.cursor = 'default';
        dropdown.appendChild(emptyDiv);

        visibleSites.forEach((site, idx) => {
          const item = document.createElement('div');
          item.className = 'ao-site-suggestion';
          let label = getSiteLabel(site) || site.name;
          if (site.isSuper) label = '🏷️ ' + label;
          if (isPrivateSite(site)) label = '🔒 ' + label;
          let distStr = '';
          if (site._distance != null) {
            distStr = site._distance < 1000 ? ` (${Math.round(site._distance)} m)` : ` (${(site._distance/1000).toFixed(1)} km)`;
          }
          label = label + distStr;
          item.textContent = label;
          item.tabIndex = 0;
          item.addEventListener('click', () => {
            const name = getSiteLabel(site) || site.name;
            currentPlaceName = name;
            if (placeInput) {
              placeInput.value = name;
              placeInput.dataset.autofilled = 'true';
            }
            dropdown.style.display = 'none';
          });
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              const name = getSiteLabel(site) || site.name;
              currentPlaceName = name;
              if (placeInput) {
                placeInput.value = name;
                placeInput.dataset.autofilled = 'true';
              }
              dropdown.style.display = 'none';
            }
          });
          dropdown.appendChild(item);
        });
      }

      function renderObservations() {
        obsListEl.innerHTML = '';

        if (!observations.length) {

        // Grupper observasjoner etter stedsnavn
        const groups = [];
        const indexByKey = new Map();
        observations.forEach((obs) => {
          const key = (obs.placeName && obs.placeName.trim()) || 'Uten stedsnavn';
          let idx = indexByKey.get(key);
          if (idx === undefined) {
            idx = groups.length;
            indexByKey.set(key, idx);
            groups.push({ key, items: [] });
          }
          groups[idx].items.push(obs);
        });
        // Sorter obs alfabetisk på art innenfor hver gruppe
        groups.forEach(group => {
          group.items.sort((a, b) => {
            const an = (a.species && a.species.taxonName) ? a.species.taxonName.toLowerCase() : '';
            const bn = (b.species && b.species.taxonName) ? b.species.taxonName.toLowerCase() : '';
            return an.localeCompare(bn, 'nb');
          });
        });

        const table = document.createElement('table');
        table.className = 'obs-table';

        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        ['Art', 'Antall', 'Aktivitet', 'Detaljer', ''].forEach((label) => {
          const th = document.createElement('th');

        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');

        groups.forEach((group) => {
          const groupRow = document.createElement('tr');
          const groupCell = document.createElement('td');
          groupCell.colSpan = 5; // Oppdatert til 5 kolonner (Art, Antall, Aktivitet, Detaljer, Slett)
          groupCell.className = 'obs-group-title';
          groupCell.textContent = group.key;
          groupRow.appendChild(groupCell);
          tbody.appendChild(groupRow);

            group.items.forEach((obs, obsIndex) => {
              const tr = document.createElement('tr');
              // Alternerende bakgrunn
              if (obsIndex % 2 === 1) {
                tr.style.background = 'rgba(59,130,246,0.07)'; // Svak blå accent
              }

              const artTd = document.createElement('td');
              artTd.textContent = obs.species && obs.species.taxonName ? obs.species.taxonName : '';
              tr.appendChild(artTd);

              const countTd = document.createElement('td');
              // Vis antall med pluss/minus-knapper, og gjør det redigerbart ved klikk på tallet
              function renderCountCell() {
                countTd.innerHTML = '';
                countTd.style.display = 'flex';
                countTd.style.alignItems = 'center';
                countTd.style.gap = '4px';

                // Minus-knapp
                const minusBtn = document.createElement('button');
                minusBtn.type = 'button';
                minusBtn.textContent = '−';
                minusBtn.title = 'Reduser antall';
                minusBtn.style.width = '22px';
                minusBtn.style.height = '22px';
                minusBtn.style.fontSize = '1em';
                minusBtn.style.borderRadius = '50%';
                minusBtn.style.border = '1px solid #888';
                minusBtn.style.background = 'rgba(34,34,34,0.7)';
                minusBtn.style.color = '#bbb';
                minusBtn.style.display = 'flex';
                minusBtn.style.alignItems = 'center';
                minusBtn.style.justifyContent = 'center';
                minusBtn.style.cursor = 'pointer';
                minusBtn.style.userSelect = 'none';
                minusBtn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  if (obs.count > 1) {
                    obs.count--;
                    saveState();
                    renderObservations();
                  }
                });

                // Tallet
                const span = document.createElement('span');
                span.textContent = obs.count != null ? String(obs.count) : '';
                span.style.cursor = 'pointer';
                span.title = 'Klikk for å endre antall';
                span.style.minWidth = '28px';
                span.style.textAlign = 'center';
                span.style.fontSize = '1.1em';
                span.addEventListener('click', () => {
                  showInput();
                });

                // Pluss-knapp
                const plusBtn = document.createElement('button');
                plusBtn.type = 'button';
                plusBtn.textContent = '+';
                plusBtn.title = 'Øk antall';
                plusBtn.style.width = '22px';
                plusBtn.style.height = '22px';
                plusBtn.style.fontSize = '1em';
                plusBtn.style.borderRadius = '50%';
                plusBtn.style.border = '1px solid #888';
                plusBtn.style.background = 'rgba(34,34,34,0.7)';
                plusBtn.style.color = '#bbb';
                plusBtn.style.display = 'flex';
                plusBtn.style.alignItems = 'center';
                plusBtn.style.justifyContent = 'center';
                plusBtn.style.cursor = 'pointer';
                plusBtn.style.userSelect = 'none';
                plusBtn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  obs.count++;
                  saveState();
                  renderObservations();
                });

                countTd.appendChild(minusBtn);
                countTd.appendChild(span);
                countTd.appendChild(plusBtn);
              }
              function showInput() {
                countTd.innerHTML = '';
                const input = document.createElement('input');
                input.type = 'number';

                  if (e.key === 'Enter') {
                    save();
                  } else if (e.key === 'Escape') {
                    renderCountCell();
                  }
                });
                input.addEventListener('blur', save);
                countTd.appendChild(input);
                input.focus();
                input.select();
                function save() {
                  const val = input.value.trim();
                  const num = parseInt(val, 10);
                  if (!val || isNaN(num) || num <= 0) {
                    renderCountCell();
                    return;

                  obs.count = num;
                  saveState();
                  renderObservations();

              const globalIndex = observations.indexOf(obs);
              if (globalIndex !== -1) {
                observations.splice(globalIndex, 1);
                renderObservations();
                saveState();
              }
            });
            deleteTd.appendChild(deleteBtn);
            tr.appendChild(deleteTd);

            tbody.appendChild(tr);
          });
        });

        table.appendChild(tbody);
        obsListEl.appendChild(table);

        if (clearBtn) {
          clearBtn.disabled = false;

      const STORAGE_KEY = 'fugleobservasjoner_v1';

      function saveState() {
        if (!window.localStorage) return;
        try {
          const payload = {
            version: 1,
            observations,
          };
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        } catch (e) {
          console.warn('Kunne ikke lagre til localStorage', e);
        }
      }

      function loadState() {
        if (!window.localStorage) return;
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const payload = JSON.parse(raw);
          if (!payload || !Array.isArray(payload.observations)) return;

          // Tøm og fyll inn i eksisterende array slik at referansen bevares
          observations.splice(0, observations.length);
          // Behold rekkefølge som lagret (push preserves stored order)
          payload.observations.forEach((o) => observations.push(o));

          // Sett stedsnavn-felt til siste brukte sted, hvis noe finnes
          const last = observations[observations.length - 1];
          if (last && last.placeName) {
            currentPlaceName = last.placeName;
            if (placeInput) {
              placeInput.value = currentPlaceName;
              placeInput.dataset.autofilled = 'false';
            }
          }
        } catch (e) {
          console.warn('Kunne ikke lese fra localStorage', e);
        }
      }

      async function fetchResults(term) {
        const q = term.trim();
        if (q.length < 2) {
          currentResults = [];
          activeIndex = -1;
          renderResults();
          emptyMsgEl.style.display = q.length ? 'block' : 'none';
          if (!q.length) emptyMsgEl.textContent = 'Ingen treff ennå. Skriv minst 2 tegn.';
          else emptyMsgEl.textContent = 'Skriv litt mer for å få treff.';
          return;
        }

        setStatus('loading', 'Søker i Artsobservasjoner …');
        emptyMsgEl.style.display = 'none';

        try {
          const includeSubtaxa = document.getElementById('include-subtaxa')?.checked;
          let url = `/api/species?search=${encodeURIComponent(q)}`;
          url += `&dontIncludeSubSpecies=${includeSubtaxa ? 'false' : 'true'}`;
          console.log('Arts-søk URL:', url); // Logging for feilsøking
          const resp = await fetch(url);
          if (!resp.ok) {
            throw new Error(`HTTP ${resp.status}`);
          }
          const data = await resp.json();
          currentResults = Array.isArray(data) ? data : [];
          activeIndex = currentResults.length ? 0 : -1;
          renderResults();

          if (!currentResults.length) {
            emptyMsgEl.style.display = 'block';
            emptyMsgEl.textContent = 'Ingen treff fra Artsobservasjoner.';
          }

          setStatus('idle', 'Klar for søk');
        } catch (err) {
          console.error('Feil ved henting av artsliste', err);
          currentResults = [];
          activeIndex = -1;
          renderResults();
          emptyMsgEl.style.display = 'block';
          emptyMsgEl.textContent = 'Feil ved kontakt med proxy/Artsobservasjoner.';
          setStatus('error', 'Feil ved søk');
        }
      }

      input.addEventListener('input', () => {
        const value = input.value;
        if (debounceTimer) {
          clearTimeout(debounceTimer);
        }
        debounceTimer = setTimeout(() => {
          fetchResults(value);
        }, 300);
      });

      input.addEventListener('keydown', (e) => {
        if (!currentResults.length) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = (activeIndex + 1) % currentResults.length;
          renderResults();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = (activeIndex - 1 + currentResults.length) % currentResults.length;
          renderResults();
        } else if (e.key === 'Enter') {
          if (activeIndex >= 0) {
            e.preventDefault();
            chooseItem(activeIndex);
          }
        }
      });

      countInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        if (!selectedSpecies) return;

        const raw = countInput.value.trim();
        const num = parseInt(raw, 10);
        if (!raw || isNaN(num) || num <= 0) {
          return;
        }

        // Gyldig antall: gå videre til aktivitet i stedet for å lagre ennå
        if (activitySelect && !activitySelect.disabled) {
          activitySelect.focus();
        }
      });

      function commitObservationFromActivity() {
        if (!selectedSpecies) return;

        const raw = countInput.value.trim();
        const num = parseInt(raw, 10);
        if (!raw || isNaN(num) || num <= 0) {
          return;
        }

        let activity = 'Stasjonær';
        if (activitySelect && !activitySelect.disabled) {
          const opt = activitySelect.options[activitySelect.selectedIndex];
          if (opt && opt.text && opt.text.trim()) {
            activity = opt.text.trim();
          }
        }

        // Hent alder og kjønn
        let age = ageSelect.value || '';
        let gender = genderSelect.value || '';

        observations.unshift({
          species: selectedSpecies,
          count: num,
          position: currentPosition,
          activity,
          placeName: currentPlaceName,
          timestamp: new Date().toISOString(),
          age,
          gender,
        });

        renderObservations();
        saveState();

        // Nullstill valgt art og deaktiver antallsfeltet inntil ny art er valgt
        const artNavnToast = selectedSpecies.taxonName;
        selectedSpecies = null;
        chosenEl.style.display = 'none';
        countInput.value = '';
        countInput.disabled = true;
        if (activitySelect) {
          // Behold forrige aktivitetsvalg (ikke nullstill)
          activitySelect.disabled = true;
        }
        
        // Deaktiver avanserte felter og nullstill verdier
        ageSelect.disabled = true;
        genderSelect.disabled = true;
        ageSelect.value = '';
        genderSelect.value = '';
        
        if (activitySubmitBtn) {
          activitySubmitBtn.disabled = true;
        }

        // Tøm søkefeltet og resultater, og flytt fokus tilbake til artsøk
        input.value = '';
        currentResults = [];
        activeIndex = -1;
        renderResults();
        // Vis kort bekreftelse på at art er registrert
        showRegisteredToast(artNavnToast);
        // Flytt fokus til artsøkefeltet
        input.focus();
        input.select();
      }

      // Toast/bekreftelse når art er registrert
      function showRegisteredToast(artNavn) {
        let toast = document.getElementById('registered-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.id = 'registered-toast';
          toast.style.position = 'fixed';
          toast.style.top = '50%';
          toast.style.left = '50%';
          toast.style.transform = 'translate(-50%, -50%)';
          toast.style.background = 'rgba(34,34,34,0.97)';
          toast.style.color = '#fff';
          toast.style.fontSize = '1.2em';
          toast.style.padding = '12px 28px';
          toast.style.borderRadius = '12px';
          toast.style.boxShadow = '0 4px 24px rgba(0,0,0,0.18)';
          toast.style.border = '2px solid #3b82f6';
          toast.style.zIndex = '9999';
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.15s';
          document.body.appendChild(toast);
        }
        toast.textContent = `${artNavn} registrert`;
        toast.style.opacity = '1';
        setTimeout(() => {
          toast.style.opacity = '0';
        }, 800);
      }

      // Event listener for aktivitetsknapp
      if (activitySubmitBtn) {
        activitySubmitBtn.addEventListener('click', () => {
          commitObservationFromActivity();
        });
      }

      if (activitySelect) {
        activitySelect.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          commitObservationFromActivity();
        });
        
        // På mobil/touch-enheter: lagre automatisk ved valg
        // På desktop: kun Enter-tast for å unngå utilsiktet lagring ved navigering med tastatur
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
          activitySelect.addEventListener('change', () => {
            commitObservationFromActivity();
          });
        }
      }

        function setLocationStatus(mode, text) {
          if (locText) {
            locText.textContent = text;
            if (mode !== 'ok') {
              locText.removeAttribute('title');
            }
          }
          if (!locDot) return;
          if (mode === 'ok') {
            locDot.style.background = '#22c55e';
          } else if (mode === 'error') {
            locDot.style.background = '#ef4444';
          } else {
            locDot.style.background = '#6b7280';
          }
        }

        function initLocation() {
          console.log('[initLocation] Kalles');
          const locBtn = document.getElementById('loc-btn');
          if (!locBtn) {
            console.warn('[initLocation] Fant ikke #loc-btn');
          } else {
            console.log('[initLocation] Fant #loc-btn, setter event-listener');
          }
          if (!navigator.geolocation) {
            setLocationStatus('error', 'Ingen geolokasjon-støtte i denne nettleseren.');
            return;
          }

          setLocationStatus('idle', 'Trykk «Oppdater posisjon» før registrering.');

          if (locBtn) {
            locBtn.addEventListener('click', () => {
              console.log('[loc-btn] Klikk registrert, starter geolokasjon');
              setLocationStatus('pending', 'Oppdaterer posisjon …');
              locBtn.disabled = true;

              navigator.geolocation.getCurrentPosition(
                (pos) => {
                  currentPosition = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                  };
                  const { lat, lon, accuracy } = currentPosition;
                  const latStr = lat.toFixed(5);
                  const lonStr = lon.toFixed(5);
                  const accStr = Math.round(accuracy);
                  setLocationStatus('ok', 'Posisjon oppdatert');
                  if (locText) {
                    locText.title = `${latStr}, ${lonStr} (±${accStr} m)`;
                  }
                  // Hent forslag til lokaliteter fra Artsobservasjoner (mobil-API)
                  const sizeParam = Number.isFinite(currentAoSizeMeters)
                    ? currentAoSizeMeters
                    : 600;
                  const aoUrl = `/api/ao-sites?lat=${encodeURIComponent(
                    lat
                  )}&lon=${encodeURIComponent(lon)}&size=${encodeURIComponent(sizeParam)}`;
                  fetch(aoUrl)
                    .then((r) => (r.ok ? r.json() : null))
                    .then((data) => {
                      if (!data || !Array.isArray(data.sites)) {
                        setAoSiteSuggestions([]);
                        return;
                      }
                      const sites = data.sites.filter(
                        (s) => s && typeof s.name === 'string' && s.name.trim()
                      );
                      setAoSiteSuggestions(sites);
                    })
                    .catch((err) => {
                      console.warn('Feil ved henting av AO-lokaliteter', err);
                      setAoSiteSuggestions([]);
                    });
                  if (locMapBtn) {
                    locMapBtn.disabled = false;
                  }
                  locBtn.disabled = false;
                },
                (err) => {
                  console.warn('Feil ved geolokasjon', err);
                  setLocationStatus('error', 'Fikk ikke tak i posisjon. Sjekk tillatelser og prøv igjen.');
                  setAoSiteSuggestions([]);
                  locBtn.disabled = false;
                },
                {
                  enableHighAccuracy: true,
                  maximumAge: 0,
                  timeout: 10000,
                }
              );
            });
          }
        }

      if (locMapBtn) {
        locMapBtn.addEventListener('click', () => {
          if (!currentPosition) return;
          const { lat, lon } = currentPosition;
          const url = `https://www.openstreetmap.org/?mlat=${encodeURIComponent(
            lat
          )}&mlon=${encodeURIComponent(lon)}#map=16/${encodeURIComponent(lat)}/${encodeURIComponent(lon)}`;
          window.open(url, '_blank', 'noopener');
        });
      }

      if (aoSizeInput) {
        const initial = parseFloat(aoSizeInput.value);
        if (!isNaN(initial) && initial > 0) {
          currentAoSizeMeters = initial;
        }
        aoSizeInput.addEventListener('input', () => {
          const v = parseFloat(aoSizeInput.value);
          if (isNaN(v) || v <= 0) return;
          currentAoSizeMeters = v;
        });
      }

      function toCsv() {
        if (!observations.length) return '';
        // Artsobservasjoner sitt importformat (fugl, v2.20) –
        // vi fyller inn Artsnavn, Lokalitetsnavn, dato og Antall.
        // Koordinater droppes inntil videre (Nord/Øst/Nøyaktighet tomme),
        // for å unngå konflikt med koordinatsystemet i AO-profilen.
        // Viktig: bruker TAB som skilletegn (som Excel gjør ved kopiering),
        // slik at innliming i Artsobservasjoner deler kolonnene riktig.
        const SEP = '\t';
        const header = [
          'Artsnavn',
          'Lokalitetsnavn',
          'Superlokalitet',
          'Nord',
          'Øst',
          'Nøyaktighet',
          'Fra dato',
          'Til dato',
          'Fra klokkeslett',
          'Til klokkeslett',
          'Antall',
          'Alder',
          'Kjønn',
          'Aktivitet',
          'Kommentar (synlig for alle)',
          'Privat kommentar (kun synlig for deg selv)',
          'Skjul funn til dato',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Medobservatør',
          'Bestemmelsesmetode',
          'Natursystem',
          'Beskriv natursystem',
          'Livsmedium',
          'Beskriv livsmedium',
          'Art som livsmedium',
          'Beskriv art som livsmedium',
          'Dybde min',
          'Dybde maks',
          'Høyde min',
          'Høyde maks',
          'Andrehånds',
          'Usikker artsbestemming',
          'Ikke spontan',
          'Interessant observasjon',
          'Ikke gjenfunnet',
          'Ikke funnet',
          'Offentlig samling',
          'Privat samling',
          'Referansenummer i samling',
          'Beskrivelse artsbestemming',
          'Bestemt av',
          'Bestemt av (fritekst)',
          'Bestemmelsesår',
          'Bekreftet av',
          'Bekreftet av (fritekst)',
          'Bekreftelsesår',
        ];

        const lines = [header.join(SEP)];

        for (const obs of observations) {
          const name = ((obs.species && obs.species.taxonName) || '').replace(/[;\t]/g, ',');
          const place = (obs.placeName || '').replace(/[;\t]/g, ',');
          const count = obs.count != null ? String(obs.count) : '';
          const activity = (obs.activity || '').replace(/[;\t]/g, ',');
          const age = (obs.age || '').replace(/[;\t]/g, ',');
          const gender = (obs.gender || '').replace(/[;\t]/g, ',');

          // Dato (Fra/til = samme dag) – format DD.MM.YYYY
          let dateStr = '';
          let timeStr = '';
          if (obs.timestamp) {
            const d = new Date(obs.timestamp);
            if (!isNaN(d.getTime())) {
              const dd = String(d.getDate()).padStart(2, '0');
              const mm = String(d.getMonth() + 1).padStart(2, '0');
              const yyyy = d.getFullYear();
              dateStr = `${dd}.${mm}.${yyyy}`;

              // Tidspunkt – format HH:MM
              const hh = String(d.getHours()).padStart(2, '0');
              const mi = String(d.getMinutes()).padStart(2, '0');
              timeStr = `${hh}:${mi}`;
            }
          }
          if (!dateStr) {
            const d = new Date();
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            dateStr = `${dd}.${mm}.${yyyy}`;
          }
          // Hvis vi ikke klarte å lage tid, lar vi klokkeslett være tomt

          const cols = new Array(54).fill('');
          // 1: Artsnavn
          cols[0] = name;
          // 2: Lokalitetsnavn
          cols[1] = place;
          // 7: Fra dato
          cols[6] = dateStr;
          // 8: Til dato (samme som Fra dato)
          cols[7] = dateStr;
          // 9: Fra klokkeslett (HH.mm) hvis tilgjengelig
          cols[8] = timeStr;
          // 10: Til klokkeslett (samme som Fra klokkeslett)
          cols[9] = timeStr;
          // 11: Antall
          cols[10] = count;
          // 12: Alder
          cols[11] = age;
          // 13: Kjønn  
          cols[12] = gender;
          // 14: Aktivitet
          cols[13] = activity;

          lines.push(cols.join(SEP));
        }
        return lines.join('\n');
      }

      if (exportBtn) {
        exportBtn.addEventListener('click', () => {
          const csv = toCsv();
          if (!csv) return;

          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'fugleobservasjoner.csv';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          flashButton(exportBtn, 'Lastet ned!');
        });
      }

      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const csv = toCsv();
          if (!csv) return;

          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(csv);
            } else {
              const ta = document.createElement('textarea');
              ta.value = csv;
              ta.style.position = 'fixed';
              ta.style.top = '-1000px';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              try {
                document.execCommand('copy');
              } finally {
                document.body.removeChild(ta);
              }
            }
          } catch (e) {
            console.warn('Kunne ikke kopiere CSV til utklippstavlen', e);
            return;
          }
          flashButton(copyBtn, 'Kopiert!');
        });
      }

      if (copyOpenBtn) {
        copyOpenBtn.addEventListener('click', async () => {
          const csv = toCsv();
          if (!csv) return;

          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(csv);
            } else {
              const ta = document.createElement('textarea');
              ta.value = csv;
              ta.style.position = 'fixed';
              ta.style.top = '-1000px';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              try {
                document.execCommand('copy');
              } finally {
                document.body.removeChild(ta);
              }
            }
            
            // Open AO import page in new tab
            window.open('https://www.artsobservasjoner.no/ImportSighting', '_blank');
            
            flashButton(copyOpenBtn, 'Åpnet!');
          } catch (e) {
            console.warn('Kunne ikke kopiere CSV til utklippstavlen', e);
          }
        });
      }

      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          if (!observations.length) return;
          const ok = window.confirm('Slette alle observasjoner i listen?');
          if (!ok) return;
          observations.splice(0, observations.length);
          renderObservations();
          saveState();
        });
      }



      window.addEventListener('DOMContentLoaded', () => {
        // Nullstill stedsnavn-input
        if (placeInput) {
          placeInput.value = '';
          currentPlaceName = '';
          placeInput.addEventListener('input', () => {
            currentPlaceName = placeInput.value;
            placeInput.dataset.autofilled = 'false';
          });
        }

        // Init posisjon og event listeners
        initLocation();

        // Last lagret state
        loadState();
        // Vis observasjoner etter lasting
        renderObservations();
      });

      // (Fjernet ekstra renderObservations her)

      // Load activity options from JSON
      (async function loadActivities() {
        try {
          const resp = await fetch('/data/activities.json');
          const activities = await resp.json();
          const sel = document.getElementById('activity');
          activities.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.value;
            opt.textContent = a.label;
            if (a.selected) opt.selected = true;
            sel.appendChild(opt);
          });
        } catch (e) {
          console.error('Kunne ikke laste aktiviteter:', e);
        }
      })();

      // Logg sidevisning til server (kun path og user-agent)
      fetch('/api/logview', {method: 'POST'}).catch(() => {});
    </script>
  </body>
</html>
