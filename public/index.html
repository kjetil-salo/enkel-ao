<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <title>Enkel-AO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <header>
          <div class="title">
            <span id="app-title" style="cursor:default;user-select:none;">🦆 Enkel-AO</span>
            <span class="pill mode-pill" id="mode-pill" style="cursor:pointer;" title="Klikk for å bytte modus">Felt</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <a href="/help.html" style="color: var(--muted); text-decoration: none; font-size: 1.2rem; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center;" title="Hjelp" onmouseover="this.style.color='var(--accent)'; this.style.background='var(--accent-soft)'" onmouseout="this.style.color='var(--muted)'; this.style.background='transparent'">📖</a>
            <a href="/settings.html" style="color: var(--muted); text-decoration: none; font-size: 1.2rem; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center;" title="Innstillinger" onmouseover="this.style.color='var(--accent)'; this.style.background='var(--accent-soft)'" onmouseout="this.style.color='var(--muted)'; this.style.background='transparent'">⚙️</a>
            <div class="kbd-hint">
              <span class="kbd-key">↑</span><span class="kbd-key">↓</span><span class="kbd-key">Enter</span>
            </div>
          </div>
        </header>

        <div class="tablet-layout">
        <div class="tablet-input-column">

        <fieldset class="section-main section-lokasjon">
          <legend>① Lokasjon</legend>
          <div id="loc-status-row" style="display:flex;align-items:center;gap:5px;margin-bottom:6px;min-height:16px;">
            <span class="loc-dot" id="loc-dot" style="width:8px;height:8px;"></span>
            <span id="loc-text" style="font-size:0.75em;color:var(--muted);line-height:1.2;"></span>
          </div>
          <div id="gps-controls-row" class="row" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:0;">
            <button class="icon-btn" id="loc-btn" title="Oppdater lokasjon" style="font-size:0.9em;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--accent-soft);color:var(--text);transition:all 0.2s;display:flex;align-items:center;gap:4px;height:32px;">
              <span style="font-size:0.85em;font-weight:500;">Oppdater lokasjon</span>
            </button>
            <style>
              /* Skjul spinner-piler på søkeradius (Mac/webkit) */
              #ao-size::-webkit-inner-spin-button,
              #ao-size::-webkit-outer-spin-button {
                -webkit-appearance: none;
                margin: 0;
              }
              #ao-size { -moz-appearance: textfield; }

              #loc-btn {
                border: 2px solid var(--accent) !important;
                border-radius: 8px !important;
                background: var(--accent-soft) !important;
                color: var(--text) !important;
                padding: 7px 18px !important;
                box-shadow: 0 2px 8px rgba(59,130,246,0.10);
                font-size: 1em !important;
                height: 38px !important;
                cursor: pointer;
              }

              /* Mobile: hide the text inside the button and reduce padding to save horizontal space */
              @media (max-width: 420px) {
                /* Force single-line layout */
                .row[style] { flex-wrap: nowrap !important; }
                #loc-btn { padding: 4px 6px !important; font-size: 0.82em !important; }
                #loc-btn span { display: inline-block !important; font-size: 0.72em !important; }
                /* Reduce input sizes */
                #ao-size { width: 52px !important; font-size: 0.85em !important; padding: 6px 4px !important; height: 30px !important; }
                .loc-dot { width:8px !important; height:8px !important; margin-right:6px !important; }
                /* Tweak other nearby elements */
                .row .icon-btn { height:30px !important; }
              }
            </style>
            <div style="display:flex;align-items:center;gap:3px;">
                <input
                  type="number"
                  id="ao-size"
                  min="100"
                  max="3000"
                  step="50"
                  value="1000"
                  style="width:60px;font-size:1em;padding:8px 6px;height:38px;border:2px solid var(--accent);border-radius:8px;background:var(--card-bg);color:var(--text);text-align:center;"
                  title="Søkeradius i meter (100-3000m)"
                />
                <span id="unit-m" style="font-size:0.85em;color:var(--muted);cursor:default;user-select:none;">m</span>
            </div>
            <button class="icon-btn" id="loc-map-btn" title="Åpne kart" style="font-size:1.5em;padding:6px 10px;border:2px solid var(--accent);border-radius:8px;background:var(--accent-soft);color:var(--text);height:38px;min-width:46px;transition:all 0.2s;display:none;box-shadow:0 2px 8px rgba(59,130,246,0.10);">🗺️</button>
            <button class="icon-btn" id="create-site-btn" title="Opprett ny AO-lokasjon" style="font-size:1.3em;padding:6px 10px;border:2px solid var(--accent);border-radius:8px;background:var(--accent-soft);color:var(--text);height:38px;min-width:46px;transition:all 0.2s;display:none;box-shadow:0 2px 8px rgba(59,130,246,0.10);">➕</button>
          </div>
          <div class="row" style="margin-top:10px;position:relative;">
            <!-- AO-lokasjoner custom dropdown (kun div) -->
            <div id="ao-sites-dropdown" class="ao-sites-dropdown-list" style="display:none;"></div>
            <label for="place">Stedsnavn</label>
            <input
              type="text"
              id="place"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="F.eks. Osen, Herdla …"
            />
            <div class="result-empty" id="ao-sites" style="display:none; margin-top:4px;"></div>
          </div>
        </fieldset>

        <fieldset class="section-main section-observasjon" style="margin:0;padding:0 6px 12px 6px;box-sizing:border-box;">
          <legend>② Observasjon</legend>
          <div class="status-row">
            <div class="status-left">
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">Klar for søk</span>
            </div>
            <div class="badge" id="result-count">0 treff</div>
          </div>

          <div style="display:flex;gap:8px;margin-top:10px;align-items:flex-end;">
            <div style="flex:1;min-width:0;">
              <label for="search" style="display:block;">Art</label>
              <div class="input-wrap" style="display:flex;align-items:center;gap:8px;">
                <span class="search-icon">🔍</span>
                <input
                  type="text"
                  id="search"
                  autocomplete="off"
                  autocorrect="off"
                  autocapitalize="off"
                  spellcheck="false"
                  placeholder="Skriv artsnavn her …"
                  style="flex:1;"
                />
              </div>
            </div>
            <div style="width:80px;flex-shrink:0;">
              <label for="count" style="display:block;">Antall</label>
              <input
                type="number"
                id="count"
                min="1"
                step="1"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="0"
                disabled
                autocomplete="off"
                style="width:100%;"
              />
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;">
            <label style="font-size:0.65em;color:#b0b0b0;display:flex;align-items:center;gap:2px;user-select:none;margin:0;">
              <input type="checkbox" id="include-subtaxa" style="margin:0 4px 0 0;vertical-align:middle;" />
              Vis underarter
            </label>
            <span id="subtaxa-offline-warning" style="display:none;font-size:0.65em;color:#eab308;line-height:1;">
              ⚠️ Ikke i offline
            </span>
          </div>

          <div class="results" id="results" role="listbox" aria-label="Arter"></div>
          <div class="result-empty" id="empty-msg" style="display:none;">Ingen treff ennå. Skriv minst 2 tegn.</div>
          <div class="row">
            <label>Aktivitet</label>
            <div id="activity-pills" class="activity-pills"></div>
            <div class="activity-input-row section-aktivitet">
              <select id="activity" disabled></select>
              <button
                type="button"
                id="activity-submit"
                class="activity-submit-btn"
                title="Registrer observasjon (Enter)"
                disabled
              >
                ✓
              </button>
            </div>
          </div>

          <!-- Dato/tid-felt for etterregistreringsmodus (skjult som default) -->
          <div class="row" id="datetime-fields" style="display:none;margin-top:20px;padding-top:8px;clear:both;">
            <label style="font-size:0.78rem;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;">Dato og tid</label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input type="date" id="obs-date" style="flex:1;padding:7px 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.45);background:radial-gradient(circle at top left,rgba(248,250,252,0.04),rgba(15,23,42,0.95));color:var(--text);font-size:16px;" />
              <label style="font-size:0.8em;color:var(--muted);white-space:nowrap;">Fra:</label>
              <input type="time" id="obs-time" placeholder="Valgfri" style="flex:1;padding:7px 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.45);background:radial-gradient(circle at top left,rgba(248,250,252,0.04),rgba(15,23,42,0.95));color:var(--text);font-size:16px;" />
              <label style="font-size:0.8em;color:var(--muted);white-space:nowrap;">Til:</label>
              <input type="time" id="obs-time-to" placeholder="Valgfri" style="flex:1;padding:7px 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.45);background:radial-gradient(circle at top left,rgba(248,250,252,0.04),rgba(15,23,42,0.95));color:var(--text);font-size:16px;" />
            </div>
          </div>
        </fieldset>

        <fieldset class="section-optional">
          <legend style="font-size:0.75rem;color:var(--muted);font-weight:400;padding:0 6px;">③ Tilleggsinfo (valgfritt)</legend>
          <div class="row advanced-row">
            <div class="advanced-field">
              <label for="age">Alder</label>
              <select id="age" disabled>
                <option value="">Ikke oppgitt</option>
                <option value="Adult">Adult</option>
                <option value="Egg">Egg</option>
                <option value="Pulli">Pulli</option>
                <option value="1K">1K</option>
                <option value="1K+">1K+</option>
                <option value="2K">2K</option>
                <option value="2K+">2K+</option>
                <option value="2K-">2K-</option>
                <option value="3K">3K</option>
                <option value="3K+">3K+</option>
                <option value="3K-">3K-</option>
                <option value="4K">4K</option>
                <option value="4K+">4K+</option>
                <option value="4K-">4K-</option>
                <option value="5K">5K</option>
                <option value="5K+">5K+</option>
                <option value="5K-">5K-</option>
                <option value="6K">6K</option>
                <option value="6K+">6K+</option>
                <option value="6K-">6K-</option>
                <option value="7K">7K</option>
                <option value="7K+">7K+</option>
                <option value="7K-">7K-</option>
              </select>
            </div>

            <div class="advanced-field">
              <label for="gender">Kjønn</label>
              <select id="gender" disabled>
                <option value="">Ikke oppgitt</option>
                <option value="Hann">Hann</option>
                <option value="Hunn">Hunn</option>
                <option value="Hunnfarget">Hunnfarget</option>
                <option value="I par">I par</option>
              </select>
            </div>
          </div>
        </fieldset>
        </div><!-- /tablet-input-column -->

        <div class="tablet-list-column">
        <div class="section">
          <div class="section-title"><img src="/public/img/ugle-logo.png" alt="" class="obs-title-owl obs-title-owl-left"><span>Observasjoner</span><img src="/public/img/ugle-logo.png" alt="" class="obs-title-owl obs-title-owl-right"></div>
          <div class="obs-list" id="obs-list"></div>
          <div class="export-row" style="max-width:calc(100% - 16px);padding-right:12px;">
            <button class="btn" id="clear-btn" disabled style="margin-right:16px;">
              <span>🗑️</span>
              <span>Tøm liste</span>
            </button>
            <!-- Kopier CSV-knapp fjernet -->
            <button class="btn" id="copy-open-btn" disabled>
              <span>🚀</span>
              <span>Send til AO</span>
            </button>
            <a class="btn" href="/medobs.html">👥 Medobservatører</a>
            <!-- Last ned CSV-knapp fjernet -->
          </div>
        </div>
        </div><!-- /tablet-list-column -->
        </div><!-- /tablet-layout -->
      </div>

    </div>

    <script type="module" src="/js/main.js?v=20260128a"></script>
    <script>
      // Registrer Service Worker for offline-støtte
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
    <footer class="footer-credit">Versjon <span id="version"></span>  |  <a href="/changelog.html" style="color:var(--accent);text-decoration:none;">Endringslogg</a>  |  © 2026 Kjetil Salomonsen</footer>
    <script type="module">
      import { VERSION } from './js/version.js';
      document.getElementById('version').textContent = VERSION;

      // Long-press på "Enkel-AO" overskriften → AO Direct
      const appTitle = document.getElementById('app-title');
      let longPressTimer = null;

      appTitle.addEventListener('touchstart', (e) => {
        longPressTimer = setTimeout(() => {
          window.location.href = '/ao-direct.html';
        }, 800);
      });

      appTitle.addEventListener('touchend', () => {
        if (longPressTimer) clearTimeout(longPressTimer);
      });

      appTitle.addEventListener('touchcancel', () => {
        if (longPressTimer) clearTimeout(longPressTimer);
      });

      // Desktop: mousedown/mouseup for long-press
      appTitle.addEventListener('mousedown', (e) => {
        longPressTimer = setTimeout(() => {
          window.location.href = '/ao-direct.html';
        }, 800);
      });

      appTitle.addEventListener('mouseup', () => {
        if (longPressTimer) clearTimeout(longPressTimer);
      });

      appTitle.addEventListener('mouseleave', () => {
        if (longPressTimer) clearTimeout(longPressTimer);
      });
    </script>

    <!-- Modal: Opprett ny AO-lokasjon -->
    <div id="create-site-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
      <div style="background:var(--card-bg);border-radius:12px;padding:20px;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
        <h3 style="margin:0 0 12px 0;font-size:1.1em;">Opprett ny AO-lokasjon</h3>
        <div style="position:relative;width:100%;height:160px;margin-bottom:12px;border-radius:8px;overflow:hidden;background:var(--border);">
          <img id="create-site-map" alt="" style="width:100%;height:100%;object-fit:cover;display:block;" />
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:rgba(239,68,68,0.9);border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);pointer-events:none;"></div>
        </div>
        <label for="create-site-name" style="font-size:0.85em;color:var(--muted);">Lokalitetsnavn</label>
        <input type="text" id="create-site-name" style="width:100%;padding:8px;margin:4px 0 12px 0;border:1px solid var(--border);border-radius:6px;font-size:16px;background:var(--card-bg);color:var(--text);box-sizing:border-box;" />
        <label for="create-site-accuracy" style="font-size:0.85em;color:var(--muted);">Nøyaktighet</label>
        <select id="create-site-accuracy" style="width:100%;padding:8px;margin:4px 0 16px 0;border:1px solid var(--border);border-radius:6px;font-size:16px;background:var(--card-bg);color:var(--text);">
          <option value="25">25 m</option>
          <option value="50" selected>50 m</option>
          <option value="100">100 m</option>
          <option value="500">500 m</option>
        </select>
        <div id="create-site-status" style="display:none;padding:8px;margin-bottom:12px;border-radius:6px;font-size:0.85em;"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button id="create-site-cancel" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:0.9em;">Avbryt</button>
          <button id="create-site-submit" style="padding:8px 16px;border:none;border-radius:6px;background:var(--accent);color:white;cursor:pointer;font-size:0.9em;font-weight:500;">Opprett</button>
        </div>
      </div>
    </div>
  </body>
</html>
