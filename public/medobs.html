<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Medobservatører — Fugleobservasjoner</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="container">
      <h1>Medobservatører</h1>
      <p>Her kan du legge til en liste over vanlige medobservatører. Denne listen beholdes selv om du tømmer på hovedsiden.</p>

      <div id="medobs-list"></div>

      <div class="row" style="margin-top:12px">
        <input id="medobs-input" type="text" placeholder="Navn på medobservatør" />
        <button id="medobs-add">Legg til</button>
      </div>

      <p style="margin-top:18px">Når du legger til medobservatører kan de velges i observasjons-editoren.</p>
      <p><a href="/">Tilbake</a></p>
    </main>

    <script>
      const KEY = 'medobs_list_v1';

      function load() {
        try {
          return JSON.parse(localStorage.getItem(KEY) || '[]');
        } catch (e) {
          return [];
        }
      }

      function save(list) {
        localStorage.setItem(KEY, JSON.stringify(list));
      }

      function render() {
        const list = load();
        const container = document.getElementById('medobs-list');
        container.innerHTML = '';
        if (!list.length) {
          container.textContent = 'Ingen medobservatører lagret.';
          return;
        }
        list.forEach((name, i) => {
          const row = document.createElement('div');
          row.className = 'row medobs-row';
          row.innerHTML = `
            <div style="flex:1">${escapeHtml(name)}</div>
            <button data-i="${i}" class="medobs-remove">Fjern</button>
          `;
          container.appendChild(row);
        });
        Array.from(document.getElementsByClassName('medobs-remove')).forEach(btn => {
          btn.addEventListener('click', (e) => {
            const i = Number(e.currentTarget.getAttribute('data-i'));
            const l = load(); l.splice(i,1); save(l); render();
          });
        });
      }

      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

      document.getElementById('medobs-add').addEventListener('click', ()=>{
        const v = document.getElementById('medobs-input').value.trim();
        if(!v) return; const l = load(); l.push(v); save(l); document.getElementById('medobs-input').value=''; render();
      });

      render();
    </script>
  </body>
</html>
