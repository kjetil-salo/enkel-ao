<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Medobservatører — Fugleobservasjoner</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg, #0f172a); color: var(--text, #e5e7eb); padding:8px; margin:0; }
      .card { background: rgba(17,24,39,0.9); padding:12px; border-radius:10px; max-width:1000px; width:100%; margin:0 auto; box-sizing:border-box; }
      label { display:block; margin:6px 0; color:var(--muted,#9ca3af); }
      input, select, textarea { width:100%; padding:8px 10px; border-radius:8px; border:1px solid rgba(148,163,184,0.15); background:rgba(255,255,255,0.02); color:var(--text); }
      .row { display:flex; gap:8px; }
      .btn { padding:8px 12px; border-radius:8px; border:1px solid rgba(148,163,184,0.15); background: #3b82f6; color:white; cursor:pointer; }
      .btn-ghost { background:transparent; border:1px solid rgba(148,163,184,0.12); color:var(--text); }
      .medobs-pulse { animation: medobsPulse 600ms ease-out; }
      @keyframes medobsPulse { 0%{background: rgba(34,197,94,0.5)} 100%{background:transparent} }
      table { width:100%; border-collapse:collapse; }
      td, th { padding:8px 6px; border-bottom:1px solid rgba(148,163,184,0.04); }
      /* Responsive adjustments to keep checkbox from overlapping name input on narrow screens */
      #medobs-table { table-layout: fixed; width:100%; }
      #medobs-table td:first-child, #medobs-table th:first-child { width: auto; }
      #medobs-table td:nth-child(2), #medobs-table th:nth-child(2) { width: 50px; text-align:center; padding-right:0; }
      #medobs-table input[type="checkbox"] { width:20px; height:20px; margin:0; vertical-align:middle; }
      .medobs-name { font-size: 16px; box-sizing: border-box; width: 100%; }
      @media (max-width:420px) {
        body { padding:6px; }
        .card { padding:10px; }
        #medobs-table td:nth-child(2), #medobs-table th:nth-child(2) { width: 44px; }
        .medobs-name { font-size: 16px; }
      }
      .muted { color:var(--muted); font-size:0.92em; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Medobservatører</h2>
      <div>
        <table id="medobs-table">
          <thead>
            <tr><th style="text-align:left">Navn</th><th style="width:80px" aria-label="Legg til automatisk">&nbsp;</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div style="margin-top:12px;text-align:right;display:flex;gap:8px;justify-content:flex-end;">
          <button type="button" id="apply-to-all-btn" class="btn">
            Legg til på alle observasjoner
          </button>
        </div>
      </div>

      <p style="margin-top:18px" class="muted">Når du har lagret, vil valgte medobservatører legges automatisk på nye observasjoner.</p>
      <p><a href="/" class="btn-ghost">Tilbake</a></p>
    </div>
    <script>
      const KEY = 'medobs_list_v1';

      function defaultList() {
        const arr = [];
        for (let i = 0; i < 10; i++) arr.push({ name: '', active: false });
        return arr;
      }

      function load() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return defaultList();
          const parsed = JSON.parse(raw);
          // Backwards compatibility: array of strings
          if (Array.isArray(parsed) && parsed.length && typeof parsed[0] === 'string') {
            const out = defaultList();
            for (let i = 0; i < Math.min(10, parsed.length); i++) out[i].name = parsed[i];
            return out;
          }
          // If already array of objects, normalize length
          if (Array.isArray(parsed)) {
            const out = defaultList();
            for (let i = 0; i < Math.min(10, parsed.length); i++) {
              const it = parsed[i] || {};
              out[i].name = it.name || '';
              out[i].active = !!it.active;
            }
            return out;
          }
          return defaultList();
        } catch (e) {
          return defaultList();
        }
      }

      function save(list) {
        localStorage.setItem(KEY, JSON.stringify(list));
      }

      function render() {
        const list = load();
        const tbody = document.querySelector('#medobs-table tbody');
        tbody.innerHTML = '';
        list.forEach((it, i) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td><input class="medobs-name" data-i="${i}" value="${escapeHtml(it.name)}" style="width:100%" /></td><td style="text-align:center"><input type="checkbox" class="medobs-active" data-i="${i}" ${it.active ? 'checked' : ''} /></td>`;
          tbody.appendChild(tr);
        });

        // Bind events
        Array.from(document.getElementsByClassName('medobs-name')).forEach(inp => {
          inp.addEventListener('input', (e) => {
            const i = Number(e.currentTarget.getAttribute('data-i'));
            const l = load(); l[i].name = e.currentTarget.value; save(l);
          });
        });
        Array.from(document.getElementsByClassName('medobs-active')).forEach(cb => {
          cb.addEventListener('change', (e) => {
            const i = Number(e.currentTarget.getAttribute('data-i'));
            const l = load(); l[i].active = !!e.currentTarget.checked; save(l);
            // Dispatch global event so other pages can react (e.g., update UI)
            try {
              window.dispatchEvent(new CustomEvent('medobs:updated', { detail: { medobs: l } }));
            } catch (err) {
              console.warn('Kunne ikke dispatch medobs:updated', err);
            }
            // Visual feedback: pulse the row
            const row = e.currentTarget.closest('tr');
            if (row) {
              row.classList.remove('medobs-pulse');
              // Force reflow to restart animation
              // eslint-disable-next-line no-unused-expressions
              row.offsetWidth;
              row.classList.add('medobs-pulse');
              setTimeout(() => row.classList.remove('medobs-pulse'), 600);
            }
          });
        });
      }

      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

      // Reset button intentionally removed to avoid accidental mass-deletion.

      /**
       * Vis toast-melding øverst på siden med undo-funksjonalitet
       * @param {number} count - Antall oppdaterte observasjoner
       * @param {Function} onUndo - Callback for undo-knapp
       */
      function showUndoToast(count, onUndo) {
        let toast = document.getElementById('medobs-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.id = 'medobs-toast';
          toast.style.cssText = `
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(34,34,34,0.97);
            color: #fff;
            font-size: 1.1em;
            padding: 12px 20px;
            border-radius: 10px;
            border: 2px solid #22c55e;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
          `;
          document.body.appendChild(toast);
        }

        // Sett innhold
        toast.innerHTML = '';
        const textSpan = document.createElement('span');
        textSpan.textContent = `${count} observasjon${count !== 1 ? 'er' : ''} oppdatert`;
        toast.appendChild(textSpan);

        // Legg til undo-knapp
        const undoBtn = document.createElement('button');
        undoBtn.textContent = 'Angre';
        undoBtn.style.cssText = `
          background: rgba(255,255,255,0.2);
          border: 1px solid rgba(255,255,255,0.3);
          color: #fff;
          padding: 4px 12px;
          border-radius: 6px;
          cursor: pointer;
          font-size: 0.9em;
          font-weight: 600;
          transition: all 0.15s;
        `;
        undoBtn.addEventListener('click', () => {
          onUndo();
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(-50%) translateY(-20px)';
        });
        toast.appendChild(undoBtn);

        // Vis toast
        requestAnimationFrame(() => {
          toast.style.opacity = '1';
          toast.style.transform = 'translateX(-50%) translateY(0)';
        });

        // Auto-skjul etter 5 sekunder
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(-50%) translateY(-20px)';
        }, 5000);
      }

      /**
       * Legg til aktive medobservatører på alle eksisterende observasjoner
       */
      function applyToAllObservations() {
        try {
          // Last aktive medobservatører
          const medobsList = load();
          const activeObservers = medobsList
            .filter(m => m.active && m.name.trim() !== '')
            .map(m => m.name.trim());

          // Valider at vi har aktive medobservatører
          if (activeObservers.length === 0) {
            alert('Ingen aktive medobservatører valgt. Huk av for minst én medobservatør i listen.');
            return;
          }

          // Last observasjoner fra localStorage
          const obsKey = 'fugleobservasjoner_v1';
          const raw = localStorage.getItem(obsKey);
          if (!raw) {
            alert('Ingen observasjoner funnet.');
            return;
          }

          const payload = JSON.parse(raw);
          const observations = payload.observations || [];

          if (observations.length === 0) {
            alert('Ingen observasjoner funnet.');
            return;
          }

          // Vis bekreftelsesdialog
          const observerList = activeObservers.join(', ');
          const confirmMsg = `Legg til følgende medobservatører på alle ${observations.length} observasjon${observations.length !== 1 ? 'er' : ''}?\n\n${observerList}`;
          const ok = window.confirm(confirmMsg);
          if (!ok) return;

          // Lag backup av alle observasjoner (deep copy av coObservers)
          const backup = observations.map(obs => ({
            ...obs,
            coObservers: obs.coObservers ? [...obs.coObservers] : []
          }));

          // Opprett ny coObservers array (alltid 10 elementer)
          const newCoObservers = [];
          for (let i = 0; i < 10; i++) {
            newCoObservers[i] = activeObservers[i] || '';
          }

          // Oppdater alle observasjoner
          observations.forEach(obs => {
            obs.coObservers = [...newCoObservers];
          });

          // Lagre tilbake til localStorage
          payload.observations = observations;
          localStorage.setItem(obsKey, JSON.stringify(payload));

          // Vis suksessmelding på knapp
          const btn = document.getElementById('apply-to-all-btn');
          if (btn) {
            const originalText = btn.textContent;
            btn.style.background = '#22c55e';
            btn.textContent = `Oppdatert ${observations.length} observasjon${observations.length !== 1 ? 'er' : ''}!`;
            btn.disabled = true;

            // Tilbakestill knapp etter 3 sekunder
            setTimeout(() => {
              btn.textContent = originalText;
              btn.style.background = '#3b82f6';
              btn.disabled = false;
            }, 3000);
          }

          // Vis undo-toast
          showUndoToast(observations.length, () => {
            try {
              // Gjenopprett backup
              const restorePayload = { version: 1, observations: backup };
              localStorage.setItem(obsKey, JSON.stringify(restorePayload));

              // Visuell feedback på knapp
              const btn = document.getElementById('apply-to-all-btn');
              if (btn) {
                const originalText = 'Legg til på alle observasjoner';
                btn.style.background = '#3b82f6';
                btn.textContent = 'Angret!';
                btn.disabled = true;

                setTimeout(() => {
                  btn.textContent = originalText;
                  btn.disabled = false;
                }, 1500);
              }
            } catch (err) {
              console.error('Feil ved undo:', err);
              alert('Feil ved undo: ' + err.message);
            }
          });

        } catch (err) {
          console.error('Feil ved masseoppdatering:', err);
          alert('Feil ved masseoppdatering: ' + err.message);
        }
      }

      // Event listener på knapp
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('apply-to-all-btn');
        if (btn) {
          btn.addEventListener('click', applyToAllObservations);
        }
      });

      render();
    </script>
  </body>
</html>
