[pytest]
# Vis verbose output med testnavn
addopts = -v --tb=short

# Filtrer vekk warnings fra tredjeparts-biblioteker
filterwarnings =
    ignore::DeprecationWarning:pyiceberg.*
    ignore::pydantic.PydanticDeprecatedSince212:pyiceberg.*
    ignore::urllib3.exceptions.NotOpenSSLWarning

# Test-discovery
testpaths = tests
python_files = test_*.py
python_functions = test_*
